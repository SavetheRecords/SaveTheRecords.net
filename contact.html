<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Rambone Records</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header id="global-header"></header>

  <main>
    <section style="max-width: 600px; margin: 0 auto; padding-top: 2rem;">
      <h2 class="section-title">Get in Touch</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">Have questions regarding specific listings, grading details, or combined delivery rates? Reach out directly via the form below or find us on Discogs.</p>
      
      <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Thank you for your message. We will respond as soon as possible.');">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" class="form-control" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="yourname@domain.com" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="6" class="form-control" placeholder="Inquire about a listing..." required></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </section>
  </main>

  <footer id="global-footer"></footer>

  <script src="js/main.js"></script>
</body>
</html>
